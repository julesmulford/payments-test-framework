name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"  # 02:00 UTC daily
  workflow_dispatch:      # allow manual trigger

jobs:
  e2e-tests:
    name: E2E Journey Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      parabank:
        image: parasoft/parabank
        ports:
          - 3000:8080
        options: >-
          --health-cmd "curl -f http://localhost:8080/parabank/ || exit 1"
          --health-interval 15s
          --health-retries 15
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: packages/e2e-tests

      - name: Initialise ParaBank DB
        run: bash scripts/init-db.sh
        env:
          PARABANK_URL: http://localhost:3000/parabank

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PARABANK_BASE_URL: http://localhost:3000/parabank

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report-${{ github.run_id }}
          path: packages/e2e-tests/playwright-report/
          retention-days: 14

  kafka-tests:
    name: Kafka Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      zookeeper:
        image: confluentinc/cp-zookeeper:7.6.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000

      kafka:
        image: confluentinc/cp-kafka:7.6.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        ports:
          - 9092:9092
        options: >-
          --health-cmd "kafka-broker-api-versions --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-retries 15

      parabank:
        image: parasoft/parabank
        ports:
          - 3000:8080
        options: >-
          --health-cmd "curl -f http://localhost:8080/parabank/ || exit 1"
          --health-interval 15s
          --health-retries 15
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Initialise ParaBank DB
        run: bash scripts/init-db.sh
        env:
          PARABANK_URL: http://localhost:3000/parabank

      - name: Build and start kafka-bridge
        run: |
          cd packages/kafka-bridge
          npm run build
          KAFKA_BROKERS=localhost:9092 PARABANK_BASE_URL=http://localhost:3000/parabank node dist/index.js &
          echo "Kafka bridge PID: $!"
          sleep 5

      - name: Run Kafka tests
        run: npm run test:kafka
        env:
          KAFKA_BROKERS: localhost:9092
          PARABANK_BASE_URL: http://localhost:3000/parabank/

  baseline-performance:
    name: Baseline Performance Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      parabank:
        image: parasoft/parabank
        ports:
          - 3000:8080
        options: >-
          --health-cmd "curl -f http://localhost:8080/parabank/ || exit 1"
          --health-interval 15s
          --health-retries 15
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.51.0/k6-v0.51.0-linux-amd64.tar.gz -L | tar xvz --strip-components 1

      - name: Initialise ParaBank DB
        run: bash scripts/init-db.sh
        env:
          PARABANK_URL: http://localhost:3000/parabank

      - name: Run baseline load test (shortened for CI — 30s)
        run: |
          ./k6 run \
            --vus 5 \
            --duration 30s \
            --env PARABANK_BASE_URL=http://localhost:3000/parabank \
            packages/performance-tests/src/scenarios/baseline-load.ts
        continue-on-error: true  # Don't block nightly on perf — capture result

      - name: Upload k6 summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-summary-${{ github.run_id }}
          path: packages/performance-tests/soak-summary.json

  # ── Failure notification — raise a GitHub issue automatically ─────────────

  raise-issue-on-failure:
    name: Raise Issue on Failure
    runs-on: ubuntu-latest
    needs: [e2e-tests, kafka-tests, baseline-performance]
    if: failure()

    steps:
      - uses: actions/checkout@v4

      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const failedJobs = [];
            if ('${{ needs.e2e-tests.result }}' === 'failure') failedJobs.push('E2E Tests');
            if ('${{ needs.kafka-tests.result }}' === 'failure') failedJobs.push('Kafka Tests');
            if ('${{ needs.baseline-performance.result }}' === 'failure') failedJobs.push('Performance Tests');

            const body = `## Nightly Pipeline Failure

            **Date:** ${new Date().toISOString().split('T')[0]}
            **Run:** [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ### Failed jobs
            ${failedJobs.map(j => `- ${j}`).join('\n')}

            ### Action required
            - [ ] Review test output in the linked run
            - [ ] Check if failure is a new flake or a genuine regression
            - [ ] If regression: create a bug ticket and link here
            - [ ] If flake: add to quarantine list via \`scripts/quarantine-flaky.ts\`

            /cc @team-quality`;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly pipeline failure — ${new Date().toISOString().split('T')[0]}`,
              body,
              labels: ['nightly-failure', 'quality'],
            });
